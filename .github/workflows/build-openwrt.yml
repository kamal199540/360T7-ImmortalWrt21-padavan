name: Build ImmortalWrt for 360T7

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x
  REPO_BRANCH: openwrt-21.02  # أو openwrt-24.10 حسب المتوفر
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: 360t7.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'تفعيل SSH للتصحيح'
        required: false
        default: 'false'
  # schedule:
  #   - cron: '0 0 1,15 * *'  # تفعيل إذا أردت بناء تلقائي مرتين شهرياً

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # ضروري لرفع الملفات إلى Releases

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo timedatectl set-timezone "$TZ"
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-mark hold grub-efi-amd64-signed
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build \
          p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools \
          qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
          xmlto xxd zlib1g-dev zstd
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth 1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && cp -r files openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH connection to Actions (للتصحيح فقط)
      uses: mxschmitt/action-tmate@v3
      if: ${{ github.event.inputs.ssh == 'true' }}

    - name: Download package sources
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize firmware files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_DIR=$PWD" >> $GITHUB_ENV
        # استخراج اسم الجهاز من الملفات
        DEVICE_NAME=$(ls *.bin | head -1 | sed 's/.*-\(.*\)-sysupgrade.bin/\1/' | sed 's/.*-\(.*\)\.bin/\1/')
        echo "DEVICE_NAME=${DEVICE_NAME:-360t7}" >> $GITHUB_ENV
        echo "BUILD_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory (Artifact)
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ImmortalWrt-360T7-${{ env.BUILD_DATE }}
        path: ${{ env.FIRMWARE_DIR }}
        retention-days: 7

    - name: Create Release
      id: create_release
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: 360T7-${{ env.BUILD_DATE }}
        name: "ImmortalWrt for 360T7 - ${{ env.BUILD_DATE }}"
        body: |
          ## 🔥 نظام ImmortalWrt لجهاز 360T7
          
          - **تاريخ البناء:** ${{ env.BUILD_DATE }}
          - **المصدر:** padavanonly/immortalwrt-mt798x
          - **الفرع:** ${{ env.REPO_BRANCH }}
          
          ### 📦 ملفات النظام
          - `*-sysupgrade.bin` → للتحديث من واجهة الراوتر
          - `*.bin` → للحرق المباشر (factory)
          
          ### ⚠️ تعليمات التثبيت
          1. حمّل الملف المناسب
          2. ادخل إلى واجهة الراوتر (192.168.1.1)
          3. اذهب إلى System → Backup/Flash Firmware
          4. ارفع ملف `sysupgrade.bin`
          
          ### 📝 ملاحظات
          - البناء تم تلقائياً عبر GitHub Actions
          - اسم المستخدم: `root` | كلمة المرور: (بدون)
        draft: false
        prerelease: false
        files: |
          ${{ env.FIRMWARE_DIR }}/*.bin
          ${{ env.FIRMWARE_DIR }}/*.itb

    - name: Delete old workflow runs
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 30
        keep_minimum_runs: 10

    - name: Keep only latest 10 releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
